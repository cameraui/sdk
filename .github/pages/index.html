<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>camera.ui SDK</title>
    <link rel="icon" href="./logo.svg" />
    <style>
      :root {
        --primary: #df2a4c;
        --primary-strong: #9c1d35;
        --bg: #ffffff;
        --bg-accent: rgba(223, 42, 76, 0.06);
        --fg: #1a1a1a;
        --muted: #59636e;
        --card: #ffffff;
        --card-border: #e6e8eb;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --primary: #e5526e;
          --primary-strong: #df2a4c;
          --bg: #1a1a1a;
          --bg-accent: rgba(229, 82, 110, 0.1);
          --fg: rgba(255, 255, 255, 0.92);
          --muted: rgba(255, 255, 255, 0.5);
          --card: #232323;
          --card-border: #2d2d2d;
          --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.4);
        }
      }
      * {
        box-sizing: border-box;
      }
      html {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        color: var(--fg);
        background:
          radial-gradient(900px 500px at 50% -10%, var(--bg-accent), transparent 70%),
          var(--bg);
        font-family:
          "Inter var", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        width: 100%;
        max-width: 800px;
        text-align: center;
      }
      .logo {
        width: 84px;
        height: 84px;
        margin-bottom: 1.5rem;
        filter: drop-shadow(0 6px 20px rgba(223, 42, 76, 0.25));
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      h1 .accent {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p.lead {
        color: var(--muted);
        margin: 0 0 2.75rem;
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      }
      a.card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.4rem;
        padding: 1.5rem;
        border: 1px solid var(--card-border);
        border-radius: 14px;
        background: var(--card);
        color: inherit;
        text-decoration: none;
        text-align: left;
        transition:
          border-color 0.18s ease,
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }
      a.card:hover {
        border-color: var(--primary);
        transform: translateY(-3px);
        box-shadow: var(--shadow);
      }
      a.card strong {
        font-size: 1.2rem;
        font-weight: 700;
      }
      a.card span {
        color: var(--muted);
        font-size: 0.82rem;
        font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      }
      a.card .arrow {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        color: var(--primary);
        opacity: 0;
        transform: translateX(-4px);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }
      a.card:hover .arrow {
        opacity: 1;
        transform: translateX(0);
      }
      footer {
        margin-top: 3rem;
        color: var(--muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }
      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="./logo.svg" alt="camera.ui" />
      <h1>camera.ui <span class="accent">SDK</span></h1>
      <p class="lead">Language-specific SDKs for building camera.ui plugins.</p>
      <div class="grid">
        <a class="card" href="./node/">
          <strong>Node.js</strong>
          <span>@camera.ui/sdk</span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
        <a class="card" href="./python/">
          <strong>Python</strong>
          <span>camera-ui-sdk</span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
        <a class="card" href="./go/">
          <strong>Go</strong>
          <span>cameraui/sdk/go</span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
      </div>
      <footer>
        <a href="https://github.com/cameraui/sdk">Source on GitHub</a>
      </footer>
    </main>
  </body>
</html>
