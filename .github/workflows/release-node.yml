name: Release Node

on:
  push:
    tags:
      - "node-v*"

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/test.yml

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches node/package.json version
        run: |
          TAG="${GITHUB_REF_NAME#node-v}"
          PKG="$(node -p "require('./node/package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match node/package.json version $PKG"
            exit 1
          fi

      - name: Install & build
        run: |
          npm ci
          npm ci --prefix node
          npm --prefix node run build

      - name: Publish to npm
        run: |
          npm install -g npm@latest
          cd node && npm publish --provenance --access public
