site_name: camera.ui Python SDK
site_description: Python SDK for building camera.ui plugins
site_url: https://cameraui.github.io/sdk/python/
repo_url: https://github.com/cameraui/sdk
repo_name: cameraui/sdk
docs_dir: docs
edit_uri: edit/main/sdk/python/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  language: en
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  # Per-SDK version shown in the header (rendered by overrides/partials/source.html).
  # Kept in sync by scripts/release.sh. All three SDKs share one repo, so the
  # auto-fetched GitHub "latest release" tag would be wrong here.
  sdk_version: "python-v1.1.9"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/seydx/camera.ui
    - icon: fontawesome/brands/discord
      link: https://discord.gg/bBGnGcbz8N
    - icon: fontawesome/brands/reddit
      link: https://www.reddit.com/r/cameraui/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            filters:
              - "!^_"
              - "!^internal$"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Plugin Guide: plugin-guide.md
  - API Reference:
    - api/index.md
    - Plugin API: api/plugin.md
    - Camera: api/camera.md
    - Sensors: api/sensor.md
    - Storage & Schema: api/storage.md
    - Manager: api/manager.md
    - Observable: api/observable.md
    - Types: api/types.md
