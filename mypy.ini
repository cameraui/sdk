[mypy]
; Ensure full coverage
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
check_untyped_defs = True

; Restrict dynamic typing
disallow_any_generics = True
disallow_subclassing_any = False
warn_return_any = True

; Know exactly what you're doing
warn_redundant_casts = True
warn_unused_ignores = False
warn_unused_configs = True
warn_unreachable = True
show_error_codes = True

; Explicit is better than implicit
no_implicit_optional = True

; Disable specific error codes for practical compatibility
; import-untyped: external libs without stubs
; import-not-found: ormsgpack has no type stubs
; no-any-return: codec returns Any from ormsgpack
; no-untyped-def: nested async generator wrappers
; no-untyped-call: calls to nested wrappers
; no-redef: response variable reassignments in handler
; misc: complex await type narrowing
; union-attr: optional attribute access patterns
; arg-type: dynamic getattr/setattr patterns
; truthy-function: function reference checks
; method-assign: dynamic method override in service
disable_error_code = import-untyped,import-not-found,redundant-cast,no-any-return,no-untyped-def,no-untyped-call,no-redef,misc,union-attr,arg-type,truthy-function,method-assign

files = camera_ui_rpc/*.py
